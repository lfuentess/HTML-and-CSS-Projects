<!DOCTYPE html>
<html lang="en">
    <head>
        <title>HTML Spacing Challenge</title>
        <link href="Basic_CSS_2.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <section>
            <h1>Text shadow effect <br>1!</h1>
            <p>Styled font.</p>
            <P>This is a trademark <br> &trade;</P>
            <P class="p_diff">This is the same <span>&#8482</span>;</P>
        </section>
        <section>
            <h2>Text shadow effect <br>2!</h2>
            <P>This is a registered trademark <span>&reg;</span></P>
            <P class="p_diff">This is the same &#174;</P>
        </section>
        <section>
            <h3>This is other shadow effect <br>3!</h3>
            <p class="p_diff">Here I using &nbsp; space</p>
            <p>This page is &copy;</p>
        </section>
    </body>
</html>

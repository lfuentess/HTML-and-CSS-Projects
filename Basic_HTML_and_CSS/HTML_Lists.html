<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Lists</title>
        <!-- <link href="Basic_CSS_2.css" rel="stylesheet" type="text/css"> -->
        <link href="CSS_Lists.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <p>List Ordered</p>
        <ol>
            <li>Bread</li>
            <li>Milk</li>
            <li>Eggs</li>
            <li>Cheese</li>
        </ol>
        <p>List Unordered</p>
        <ul>
            <li>Cats</li>
            <li>Dogs</li>
            <li>Snakes</li>
            <li>Birds</li>
        </ul>
    </body>
</html>

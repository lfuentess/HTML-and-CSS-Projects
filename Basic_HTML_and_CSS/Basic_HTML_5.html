<!DOCTYPE html>
<html lang="en">
    <head>
        <title>entity names and entity numbers</title>
        <link href="Basic_CSS_2.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <h1>Text shadow effect 1!</h1>
        <p>Styled font.</p>
        <P>This is a trademark &trade;</P>

        <h2>Text shadow effect 2!</h2>

        <h3>This is other shadow effect 3!</h3>
    </body>
